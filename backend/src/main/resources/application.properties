spring.application.name=backend

# PostgreSQL database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/somaport}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kawtar123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.h2.console.enabled=false

# JWT
app.jwt.secret=${APP_JWT_SECRET:SomaPortSuperSecretKey1234567890}
app.jwt.expiration=${APP_JWT_EXPIRATION:900000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# Security - brute-force protection
app.security.max-failed-attempts=${APP_SECURITY_MAX_FAILED_ATTEMPTS:5}
app.security.lockout-duration-minutes=${APP_SECURITY_LOCKOUT_MINUTES:15}

# Serveur
server.port=8080
